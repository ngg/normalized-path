name: Fuzz

on:
  workflow_call:
    inputs:
      linux-timeout:
        type: number
        default: 60
      macos-timeout:
        type: number
        default: 60
  workflow_dispatch:
    inputs:
      linux-timeout:
        description: "Linux fuzz timeout in seconds"
        type: number
        default: 60
      macos-timeout:
        description: "macOS fuzz timeout in seconds"
        type: number
        default: 60

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fuzz-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true
      - uses: actions/cache/restore@v5
        with:
          path: fuzz/corpus
          key: fuzz-linux-${{ github.run_id }}
          restore-keys: fuzz-
          enableCrossOsArchive: true
      - run: cargo install cargo-fuzz
      - run: |
          for target in $(cargo fuzz list 2>/dev/null); do
            cargo fuzz run "$target" -- -max_total_time="$TIMEOUT"
            cargo fuzz cmin "$target"
          done
        env:
          TIMEOUT: ${{ inputs.linux-timeout }}
      - uses: actions/cache/save@v5
        if: always()
        with:
          path: fuzz/corpus
          key: fuzz-linux-${{ github.run_id }}
          enableCrossOsArchive: true
      - uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: fuzz-artifacts-linux
          path: fuzz/artifacts

  fuzz-macos:
    needs: fuzz-linux
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true
      - uses: actions/cache/restore@v5
        with:
          path: fuzz/corpus
          key: fuzz-macos-${{ github.run_id }}
          restore-keys: |
            fuzz-linux-${{ github.run_id }}
            fuzz-
          enableCrossOsArchive: true
      - run: cargo install cargo-fuzz
      - run: |
          for target in $(cargo fuzz list 2>/dev/null); do
            cargo fuzz run "$target" -- -max_total_time="$TIMEOUT"
            cargo fuzz cmin "$target"
          done
        env:
          TIMEOUT: ${{ inputs.macos-timeout }}
      - uses: actions/cache/save@v5
        if: always()
        with:
          path: fuzz/corpus
          key: fuzz-macos-${{ github.run_id }}
          enableCrossOsArchive: true
      - uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: fuzz-artifacts-macos
          path: fuzz/artifacts
