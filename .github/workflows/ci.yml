name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build
      - run: cargo build --no-default-features
      - run: cargo test
      - run: cargo test --no-default-features

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@v2
      - run: cargo build
      - run: cargo build --no-default-features
      - run: cargo test
      - run: cargo test --no-default-features

  wasm32-unknown-unknown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true
      - run: cargo build --target wasm32-unknown-unknown
      - run: |
          VERSION=$(cargo pkgid wasm-bindgen | cut -d"@" -f2)
          INSTALLED=$(wasm-bindgen --version 2>/dev/null | cut -d" " -f2 || echo "")
          if [ "$VERSION" != "$INSTALLED" ]; then
            cargo install -f wasm-bindgen-cli --version "$VERSION"
          fi
      - run: cargo test --target wasm32-unknown-unknown

  wasm32-wasip1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true
      - run: cargo build --target wasm32-wasip1
      - run: cargo install wasmtime-cli
      - run: cargo test --target wasm32-wasip1

  fuzz-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true
      - uses: actions/cache@v5
        with:
          path: fuzz/corpus
          key: fuzz-linux-${{ github.run_id }}
          restore-keys: fuzz-
      - run: cargo install cargo-fuzz
      - run: |
          for target in $(cargo fuzz list 2>/dev/null); do
            cargo fuzz run "$target" -- -max_total_time=300
            cargo fuzz cmin "$target"
          done
      - uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: fuzz-artifacts-linux
          path: fuzz/artifacts

  fuzz-macos:
    needs: fuzz-linux
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true
      - uses: actions/cache@v5
        with:
          path: fuzz/corpus
          key: fuzz-macos-${{ github.run_id }}
          restore-keys: |
            fuzz-linux-${{ github.run_id }}
            fuzz-
      - run: cargo install cargo-fuzz
      - run: |
          for target in $(cargo fuzz list 2>/dev/null); do
            cargo fuzz run "$target" -- -max_total_time=60
            cargo fuzz cmin "$target"
          done
      - uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: fuzz-artifacts-macos
          path: fuzz/artifacts
